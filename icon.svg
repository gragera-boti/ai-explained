<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern (neural net feel) -->
  <g opacity="0.06" stroke="#00d2ff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  
  <!-- Brain/circuit outline -->
  <g transform="translate(256, 200)" opacity="0.15">
    <circle r="120" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <circle r="80" fill="none" stroke="url(#glow)" stroke-width="1.5"/>
    <circle r="40" fill="none" stroke="url(#glow)" stroke-width="1"/>
    <!-- Neural connection dots -->
    <circle cx="-60" cy="-40" r="4" fill="#00d2ff"/>
    <circle cx="50" cy="-60" r="4" fill="#7b2ff7"/>
    <circle cx="-30" cy="50" r="4" fill="#00d2ff"/>
    <circle cx="70" cy="30" r="4" fill="#7b2ff7"/>
    <circle cx="0" cy="-80" r="4" fill="#00d2ff"/>
    <circle cx="-80" cy="20" r="4" fill="#7b2ff7"/>
    <circle cx="40" cy="70" r="4" fill="#00d2ff"/>
    <!-- Connection lines -->
    <line x1="-60" y1="-40" x2="50" y2="-60" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="-60" x2="70" y2="30" stroke="#7b2ff7" stroke-width="1" opacity="0.3"/>
    <line x1="-30" y1="50" x2="40" y2="70" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <line x1="-80" y1="20" x2="-30" y2="50" stroke="#7b2ff7" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-80" x2="-60" y2="-40" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-80" x2="50" y2="-60" stroke="#7b2ff7" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Microphone icon -->
  <g transform="translate(256, 190)">
    <!-- Mic body -->
    <rect x="-24" y="-70" width="48" height="85" rx="24" fill="url(#glow)"/>
    <!-- Mic grille lines -->
    <line x1="-14" y1="-50" x2="14" y2="-50" stroke="#1a1a2e" stroke-width="2" opacity="0.3"/>
    <line x1="-14" y1="-38" x2="14" y2="-38" stroke="#1a1a2e" stroke-width="2" opacity="0.3"/>
    <line x1="-14" y1="-26" x2="14" y2="-26" stroke="#1a1a2e" stroke-width="2" opacity="0.3"/>
    <!-- Mic stand arc -->
    <path d="M-40,20 Q-40,65 0,65 Q40,65 40,20" fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
    <!-- Mic stand -->
    <line x1="0" y1="65" x2="0" y2="90" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-20" y1="90" x2="20" y2="90" stroke="url(#glow)" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Sound waves -->
  <g transform="translate(256, 175)" opacity="0.6">
    <path d="M55,-30 Q70,-15 55,0" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M65,-45 Q90,-15 65,15" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M-55,-30 Q-70,-15 -55,0" fill="none" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round"/>
    <path d="M-65,-45 Q-90,-15 -65,15" fill="none" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- "AI" text -->
  <text x="256" y="370" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="72" font-weight="800" fill="url(#glow)" text-anchor="middle" letter-spacing="8">AI</text>
  
  <!-- "EXPLAINED" text -->
  <text x="256" y="410" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="500" fill="#ffffff" text-anchor="middle" letter-spacing="12" opacity="0.85">EXPLAINED</text>
  
  <!-- Bottom accent line -->
  <rect x="160" y="430" width="192" height="3" rx="1.5" fill="url(#wave)" opacity="0.5"/>
</svg>
